<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #1e3c72;
      --text-color: #ffffff;
      --card-bg: rgba(255, 255, 255, 0.1);
    }

    body.light {
      --bg-color: #f0f0f0;
      --text-color: #111;
      --card-bg: #ffffffee;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.4s, color 0.4s;
      padding: 20px;
    }

    .weather-container {
      background-color: var(--card-bg);
      padding: 30px;
      border-radius: 15px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin: 15px 0;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 1rem;
    }

    button {
      padding: 10px 20px;
      background-color: var(--text-color);
      color: var(--bg-color);
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin: 5px;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.85;
    }

    .result {
      margin-top: 20px;
      text-align: left;
    }

    .result p {
      margin: 8px 0;
      font-size: 0.95rem;
    }

    .icon {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .top-buttons {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    @media (max-width: 500px) {
      .weather-container {
        padding: 20px;
      }
      .icon {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>
  <div class="weather-container">
    <div class="top-buttons">
      <button onclick="getWeatherByLocation()">📍 My Location</button>
      <button onclick="toggleMode()">🌓 Toggle Mode</button>
    </div>

    <input type="text" id="cityInput" placeholder="Enter city name"/>
    <button onclick="getWeather()">Get Weather</button>

    <div class="result" id="weatherResult"></div>
  </div>

  <script>
    const apiKey = '6d01b67df7f98025af8ef09616e350ce';

    function toggleMode() {
      document.body.classList.toggle('light');
    }

    function getWeather() {
      const city = document.getElementById('cityInput').value.trim();
      if (!city) return alert('Please enter a city name');
      fetchWeatherByCity(city);
    }

    function getWeatherByLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          const { latitude, longitude } = pos.coords;
          fetchWeatherByCoords(latitude, longitude);
        }, () => alert('Location access denied'));
      } else {
        alert('Geolocation not supported');
      }
    }

    function fetchWeatherByCity(city) {
      fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${apiKey}&units=metric`)
        .then(res => res.json())
        .then(data => renderWeather(data))
        .catch(() => alert('Something went wrong'));
    }

    function fetchWeatherByCoords(lat, lon) {
      fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric`)
        .then(res => res.json())
        .then(data => renderWeather(data))
        .catch(() => alert('Failed to get weather by location'));
    }

    function renderWeather(data) {
      if (data.cod !== 200) {
        document.getElementById('weatherResult').innerHTML = `<p style="color:red;">❌ ${data.message}</p>`;
        return;
      }

      const icon = getWeatherIcon(data.weather[0].main, data.main.temp);
      document.getElementById('weatherResult').innerHTML = `
        <div class="icon">${icon}</div>
        <p><strong>City:</strong> ${data.name}</p>
        <p><strong>Condition:</strong> ${data.weather[0].description}</p>
        <p><strong>Temperature:</strong> ${data.main.temp} °C</p>
        <p><strong>Humidity:</strong> ${data.main.humidity}%</p>
        <p><strong>Wind Speed:</strong> ${data.wind.speed} m/s</p>
      `;
    }

    function getWeatherIcon(condition, temp) {
      const c = condition.toLowerCase();
      if (c.includes('clear')) return '☀️';
      if (c.includes('cloud')) return '☁️';
      if (c.includes('rain')) return '🌧️';
      if (c.includes('snow')) return '❄️';
      if (c.includes('storm') || c.includes('thunder')) return '🌩️';
      if (temp > 30) return '🔥';
      return '🌥️';
    }
  </script>
</body>
</html>
